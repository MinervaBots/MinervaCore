<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinagem ESP32 (Pinout)</title>
    <meta name="robots" content="noindex">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0e14;
            --bg-surface: #131920;
            --bg-elevated: #1a2028;
            --bg-hover: #212931;
            --border-subtle: #1f2933;
            --border-medium: #323f4e;
            --border-bright: #52606d;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --text-primary: #e4e7eb;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            
            --c-pwr: #ef4444;
            --c-gnd: #52606d;
            --c-ser: #3b82f6;
            --c-ana: #10b981;
            --c-rtc: #a855f7;
            --c-tch: #ec4899;
            --c-dac: #f59e0b;
            --c-warn: #f97316;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            height: 56px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #2563eb 100%);
            border-radius: 3px;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .brand-text {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        main {
            display: grid;
            grid-template-columns: 1fr 360px;
            flex: 1;
            overflow: hidden;
        }

        #workbench {
            position: relative;
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(var(--border-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 40px;
        }

        .inspector {
            background: var(--bg-surface);
            border-left: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .inspector-section {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .section-header {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-header::before {
            content: '';
            width: 3px;
            height: 3px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        .pin-id-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 10px 16px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .meta-label { 
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .meta-value { 
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }

        .capabilities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        .capability-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2px;
            border: 1px solid;
            transition: all 0.15s ease;
        }

        .capability-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .tech-note {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            padding: 12px;
            background: var(--bg-deep);
            border-radius: 4px;
            border-left: 2px solid var(--accent-primary);
        }

        .legend-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            box-shadow: 0 0 6px currentColor;
        }

        .warning-banner {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.08) 0%, rgba(249, 115, 22, 0.04) 100%);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 6px;
            padding: 14px;
        }

        .warning-banner .section-header {
            color: var(--c-warn);
            margin-bottom: 10px;
        }

        .board-svg {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
        }

        .pin-hitbox {
            fill: transparent;
            cursor: pointer;
        }

        .pin-conductor {
            transition: all 0.15s ease;
        }

        .pin-group:hover .pin-conductor {
            fill: var(--accent-primary);
            filter: drop-shadow(0 0 4px var(--accent-primary));
        }

        .pin-group.selected .pin-conductor {
            fill: var(--accent-primary);
            stroke: rgba(255,255,255,0.3);
            stroke-width: 0.5px;
            filter: drop-shadow(0 0 6px var(--accent-primary));
        }

        .pin-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            fill: var(--text-tertiary);
            pointer-events: none;
            transition: fill 0.15s ease;
        }

        .pin-group:hover .pin-label,
        .pin-group.selected .pin-label {
            fill: var(--text-primary);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 30px;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 14px;
            opacity: 0.2;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        .empty-text {
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.5;
            max-width: 240px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border-medium); 
            border-radius: 3px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

        @media (max-width: 1024px) {
            main { grid-template-columns: 1fr; }
            .inspector { border-left: none; border-top: 1px solid var(--border-subtle); }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-text">
            <h1>ESP32 PINOUT</h1>
        </div>
    </div>
</header>

<main>
    <div id="workbench"></div>

    <aside class="inspector">
        <div id="pin-details" class="inspector-section" style="flex: 1;">
            <div class="empty-state">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
                <h2 class="empty-text">Selecione um pino no ESP32 para inspecionar as características de hardware</h2>
            </div>
        </div>

        <div class="inspector-section">
            <div class="section-header">Classificação de Sinais</div>
            <div class="legend-container" id="legend"></div>
        </div>

        <div class="inspector-section">
            <div class="warning-banner">
                <div class="section-header">Restrição de Hardware</div>
                <p class="warning-text" style="font-size: 12px; color: var(--text-secondary);">
                    Os pinos GPIO 6-11 estão conectados internamente à memória flash. O uso de E/S digital nestes pinos causará falhas no sistema.
                </p>
            </div>
        </div>
    </aside>
</main>

<script>
const SIGNAL_TYPES = {
    pwr: { label: "Alimentação", color: "var(--c-pwr)" },
    gnd: { label: "Terra (GND)", color: "var(--c-gnd)" },
    ser: { label: "Serial/Bus", color: "var(--c-ser)" },
    ana: { label: "Analógico", color: "var(--c-ana)" },
    rtc: { label: "RTC/Controle", color: "var(--c-rtc)" },
    tch: { label: "Capacitivo", color: "var(--c-tch)" },
    dac: { label: "DAC", color: "var(--c-dac)" },
    warn: { label: "Reservado", color: "var(--c-warn)" },
    gen: { label: "GPIO", color: "var(--border-bright)" }
};

const PIN_DEFINITIONS = [
    { id: "EN", side: "L", pos: 0, func: [{name:"EN", type:"rtc"}], note: "Botão Reset/Enable. Puxe para BAIXO (GND) para reiniciar." },
    { id: "GPIO36", side: "L", pos: 1, isInputOnly: true, func: [{name:"GPIO36", type:"gen"},{name:"ADC1_CH0", type:"ana"},{name:"SENSOR_VP", type:"rtc"}], note: "Apenas entrada. Sem resistores internos de pull-up/down." },
    { id: "GPIO39", side: "L", pos: 2, isInputOnly: true, func: [{name:"GPIO39", type:"gen"},{name:"ADC1_CH3", type:"ana"},{name:"SENSOR_VN", type:"rtc"}], note: "Apenas entrada. Sem resistores internos de pull-up/down." },
    { id: "GPIO34", side: "L", pos: 3, isInputOnly: true, func: [{name:"GPIO34", type:"gen"},{name:"ADC1_CH6", type:"ana"}], note: "Apenas entrada. Sem resistores internos de pull-up/down." },
    { id: "GPIO35", side: "L", pos: 4, isInputOnly: true, func: [{name:"GPIO35", type:"gen"},{name:"ADC1_CH7", type:"ana"}], note: "Apenas entrada. Sem resistores internos de pull-up/down." },
    { id: "GPIO32", side: "L", pos: 5, func: [{name:"GPIO32", type:"gen"},{name:"ADC1_CH4", type:"ana"},{name:"TOUCH9", type:"tch"}], note: "RTC GPIO. Funcional durante o Deep Sleep." },
    { id: "GPIO33", side: "L", pos: 6, func: [{name:"GPIO33", type:"gen"},{name:"ADC1_CH5", type:"ana"},{name:"TOUCH8", type:"tch"}], note: "RTC GPIO. Funcional durante o Deep Sleep." },
    { id: "GPIO25", side: "L", pos: 7, func: [{name:"GPIO25", type:"gen"},{name:"DAC_1", type:"dac"},{name:"ADC2_CH8", type:"ana"}], note: "Saída Analógica (DAC). Nota: ADC2 indisponível com Wi-Fi ligado." },
    { id: "GPIO26", side: "L", pos: 8, func: [{name:"GPIO26", type:"gen"},{name:"DAC_2", type:"dac"},{name:"ADC2_CH9", type:"ana"}], note: "Saída Analógica (DAC). Nota: ADC2 indisponível com Wi-Fi ligado." },
    { id: "GPIO27", side: "L", pos: 9, func: [{name:"GPIO27", type:"gen"},{name:"TOUCH7", type:"tch"},{name:"ADC2_CH7", type:"ana"}], note: "Nota: ADC2 indisponível com Wi-Fi ligado." },
    { id: "GPIO14", side: "L", pos: 10, func: [{name:"GPIO14", type:"gen"},{name:"HSPI_CLK", type:"ser"},{name:"TOUCH6", type:"tch"},{name:"ADC2_CH6", type:"ana"}], note: "Nota: ADC2 indisponível com Wi-Fi ligado." },
    { id: "GPIO12", side: "L", pos: 11, isStrapping: true, func: [{name:"GPIO12", type:"gen"},{name:"HSPI_MISO", type:"ser"},{name:"TOUCH5", type:"tch"},{name:"ADC2_CH5", type:"ana"}], note: "Pino de Strapping (MTDI). Puxar para ALTO (3V3) define a tensão da flash para 1.8V e pode impedir o boot em módulos de 3.3V." },
    { id: "GPIO13", side: "L", pos: 12, func: [{name:"GPIO13", type:"gen"},{name:"HSPI_MOSI", type:"ser"},{name:"TOUCH4", type:"tch"},{name:"ADC2_CH4", type:"ana"}], note: "Nota: ADC2 indisponível com Wi-Fi ligado." },
    { id: "GPIO9", side: "L", pos: 13, func: [{name:"FLASH_D2", type:"warn"}] },
    { id: "GPIO10", side: "L", pos: 14, func: [{name:"FLASH_D3", type:"warn"}] },
    { id: "GPIO11", side: "L", pos: 15, func: [{name:"FLASH_CMD", type:"warn"}] },
    { id: "GND", side: "L", pos: 16, func: [{name:"GND", type:"gnd"}] },
    { id: "VIN", side: "L", pos: 17, func: [{name:"5V_IN", type:"pwr"}], note: "Entrada 5V (Dependente do DevKit). Alimenta o regulador de 3.3V da placa." },
    
    { id: "GPIO23", side: "R", pos: 0, func: [{name:"GPIO23", type:"gen"},{name:"VSPI_MOSI", type:"ser"}] },
    { id: "GPIO22", side: "R", pos: 1, func: [{name:"GPIO22", type:"gen"},{name:"I2C_SCL", type:"ser"}] },
    { id: "TX0", side: "R", pos: 2, func: [{name:"GPIO1", type:"gen"},{name:"UART0_TXD", type:"ser"}], note: "Conectado ao conversor USB-Serial. Evite usar para IO geral." },
    { id: "RX0", side: "R", pos: 3, func: [{name:"GPIO3", type:"gen"},{name:"UART0_RXD", type:"ser"}], note: "Conectado ao conversor USB-Serial. Evite usar para IO geral." },
    { id: "GPIO21", side: "R", pos: 4, func: [{name:"GPIO21", type:"gen"},{name:"I2C_SDA", type:"ser"}] },
    { id: "GPIO19", side: "R", pos: 5, func: [{name:"GPIO19", type:"gen"},{name:"VSPI_MISO", type:"ser"}] },
    { id: "GPIO18", side: "R", pos: 6, func: [{name:"GPIO18", type:"gen"},{name:"VSPI_CLK", type:"ser"}] },
    { id: "GPIO5", side: "R", pos: 7, isStrapping: true, func: [{name:"GPIO5", type:"gen"},{name:"VSPI_CS0", type:"ser"}], note: "Pino de Strapping. O estado é amostrado na inicialização; pode oscilar brevemente durante o boot." },
    { id: "TX2", side: "R", pos: 8, func: [{name:"GPIO17", type:"gen"},{name:"UART2_TXD", type:"ser"}] },
    { id: "RX2", side: "R", pos: 9, func: [{name:"GPIO16", type:"gen"},{name:"UART2_RXD", type:"ser"}] },
    { id: "GPIO4", side: "R", pos: 10, func: [{name:"GPIO4", type:"gen"},{name:"TOUCH0", type:"tch"},{name:"ADC2_CH0", type:"ana"}], note: "Nota: ADC2 indisponível com Wi-Fi ligado." },
    { id: "GPIO2", side: "R", pos: 11, isStrapping: true, func: [{name:"GPIO2", type:"gen"},{name:"TOUCH2", type:"tch"},{name:"ADC2_CH2", type:"ana"}], note: "Pino de Strapping. Deve estar em BAIXO (GND) ou flutuante durante a gravação (flashing)." },
    { id: "GPIO15", side: "R", pos: 12, isStrapping: true, func: [{name:"GPIO15", type:"gen"},{name:"TOUCH3", type:"tch"},{name:"ADC2_CH3", type:"ana"}], note: "Pino de Strapping (MTDO). Puxar para BAIXO desativa mensagens de boot ROM na UART." },
    { id: "GPIO0", side: "R", pos: 13, isStrapping: true, func: [{name:"GPIO0", type:"gen"},{name:"TOUCH1", type:"tch"},{name:"ADC2_CH1", type:"ana"}], note: "Pino de Strapping. Deve ser puxado para BAIXO (GND) para entrar no modo de gravação." },
    { id: "GPIO8", side: "R", pos: 14, func: [{name:"FLASH_D1", type:"warn"}] },
    { id: "GPIO7", side: "R", pos: 15, func: [{name:"FLASH_D0", type:"warn"}] },
    { id: "GPIO6", side: "R", pos: 16, func: [{name:"FLASH_CLK", type:"warn"}] },
    { id: "3V3", side: "R", pos: 17, func: [{name:"3V3_OUT", type:"pwr"}], note: "Saída regulada de 3.3V. Corrente máxima depende do regulador LDO da placa." }
];

let activePin = null;

function renderBoard() {
    const container = document.getElementById('workbench');
    
    let markup = `<svg class="board-svg" viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#1a2028;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#131920;stop-opacity:1" />
                </linearGradient>
            </defs>
            <rect x="110" y="40" width="260" height="600" rx="6" fill="url(#pcbGrad)" stroke="#1f2933" stroke-width="1.5"/>
            <rect x="140" y="75" width="200" height="170" rx="3" fill="#0a0e14" stroke="#1f2933" stroke-width="1"/>
            <text x="240" y="160" text-anchor="middle" fill="#323f4e" font-family="JetBrains Mono" font-weight="600" font-size="14" letter-spacing="1">ESP32</text>
    `;

    PIN_DEFINITIONS.forEach(pin => {
        const isLeft = pin.side === 'L';
        const xBase = isLeft ? 125 : 355;
        const yBase = 110 + (pin.pos * 28);
        const isSelected = activePin === pin.id;

        markup += `
            <g class="pin-group ${isSelected ? 'selected' : ''}" onclick="selectPin('${pin.id}')">
                <rect x="${isLeft ? xBase-12 : xBase}" y="${yBase-5}" width="12" height="10" rx="1" class="pin-conductor" fill="#52606d"/>
                <rect x="${isLeft ? xBase-36 : xBase-6}" y="${yBase-12}" width="42" height="24" class="pin-hitbox"/>
                <text x="${isLeft ? xBase-18 : xBase+18}" y="${yBase+3}" text-anchor="${isLeft ? 'end' : 'start'}" class="pin-label">${pin.id}</text>
            </g>
        `;
    });

    markup += `</svg>`;
    container.innerHTML = markup;
}

function selectPin(pinId) {
    activePin = pinId;
    renderBoard();
    
    const pin = PIN_DEFINITIONS.find(p => p.id === pinId);
    const detailsPanel = document.getElementById('pin-details');
    
    let pinType = 'Especial';
    if (pin.id.startsWith('GPIO')) {
        pinType = pin.isInputOnly ? 'Entrada Digital (Apenas)' : 'E/S Digital';
    } else if (pin.id === 'GND') {
        pinType = 'Terra';
    } else if (pin.id === '3V3' || pin.id === 'VIN' || pin.id === 'EN') {
        pinType = 'Alimentação/Controle';
    }

    const hasWarning = pin.func.some(f => f.type === 'warn');
    const isADC2 = pin.func.some(f => f.name.includes("ADC2"));
    
    detailsPanel.innerHTML = `
        <div class="section-header">Detalhes do Pino ${pin.isStrapping ? '<span style="color:var(--c-tch); margin-left:10px;">[STRAPPING]</span>' : ''}</div>
        <div class="pin-id-display">${pin.id}</div>
        
        <div class="metadata-grid">
            <span class="meta-label">Lado Header</span>
            <span class="meta-value">${pin.side === 'L' ? 'ESQUERDA' : 'DIREITA'}</span>
            
            <span class="meta-label">Índice</span>
            <span class="meta-value">0x${pin.pos.toString(16).toUpperCase().padStart(2, '0')}</span>
            
            <span class="meta-label">Tipo</span>
            <span class="meta-value" style="color:${pin.isInputOnly ? 'var(--c-warn)' : 'inherit'}">${pinType}</span>
        </div>

        <div class="section-header">Funções Multiplexadas</div>
        <div class="capabilities-list">
            ${pin.func.map(f => {
                const sig = SIGNAL_TYPES[f.type];
                return `<span class="capability-badge" style="
                    background: ${sig.color}15;
                    border-color: ${sig.color}40;
                    color: ${sig.color};
                ">${f.name}</span>`;
            }).join('')}
        </div>

        <div class="section-header">Notas de Engenharia</div>
        <div class="tech-note">
            ${pin.note || `GPIO multiplexado padrão roteado via matriz do ESP32.`}
            ${pin.isInputOnly ? '<br><strong style="color:var(--c-warn)">CRÍTICO:</strong> Este pino não possui drivers de saída.' : ''}
            ${isADC2 ? '<br><strong style="color:var(--c-warn)">CONFLITO WIFI:</strong> Pinos ADC2 não podem ser usados enquanto o Wi-Fi estiver ativo.' : ''}
            ${hasWarning ? '<br><strong style="color:var(--c-pwr)">RESERVADO:</strong> O acesso direto causará falha no sistema (SPI Flash bus).' : ''}
        </div>
    `;
}

// Initialize legend
document.getElementById('legend').innerHTML = Object.entries(SIGNAL_TYPES).map(([key, sig]) => `
    <div class="legend-item">
        <div class="legend-swatch" style="background:${sig.color}"></div>
        <span>${sig.label}</span>
    </div>
`).join('');

renderBoard();
</script>
</body>
</html>
